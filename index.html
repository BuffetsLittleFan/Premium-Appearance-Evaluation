<body>

    <script>

        };

            eyes: [
                { type: '双眼皮', feature: '外眼角下垂', items: ['眼型基本符合美学标准', '眼神自然有亲和力', '建议通过眼妆增强眼部立体感'] },
                { type: '内双', feature: '眼型偏圆', items: ['眼睛显得幼态可爱', '适合走甜美路线', '建议用大地色系眼影放大双眼'] },
                { type: '明显的双眼皮', feature: '眼尾上扬', items: ['眼型妩媚动人', '自带眼线效果', '建议淡妆即可，避免浓妆显老'] }
            ],
            nose: [
                { type: '直鼻', feature: '鼻翼适中', items: ['鼻型标准，侧脸优美', '符合主流审美', '建议高光打在鼻梁中段'] },
                { type: '小翘鼻', feature: '鼻头微翘', items: ['鼻型俏皮可爱', '显年轻活力', '建议不要过度修容'] },
                { type: '驼峰鼻', feature: '鼻梁有起伏', items: ['鼻型有辨识度', '高级感满满', '建议接受自然美，少量修饰'] }
            ],
            lips: [
                { type: 'M唇', feature: '唇珠明显', items: ['唇形立体性感', '上镜效果好', '建议裸色或豆沙色唇膏'] },
                { type: '微笑唇', feature: '嘴角上扬', items: ['自带笑容，亲和力强', '人缘好', '建议避免太深的颜色'] },
                { type: '厚唇', feature: '唇形饱满', items: ['唇形性感诱人', '气场强大', '建议咬唇妆或渐变唇'] }
            ],
            face: [
                { type: '鹅蛋脸', feature: '线条流畅', items: ['脸型标准，百搭发型', '适合各种妆容', '几乎不需要修容'] },
                { type: '圆脸', feature: '下巴圆润', items: ['显年轻可爱', '亲和力强', '建议用修容拉长脸型'] },
                { type: '方脸', feature: '下颌明显', items: ['脸型高级有气场', '适合御姐风', '建议用发型柔化轮廓'] }
            ]
        };

        const makeupData = [
            [{ title: '眼妆重点', content: '您的眼型很好，只需用浅色眼影打底，深色眼影在睫毛根部晕染增加立体感即可。' }, { title: '鼻部修容', content: '您的鼻型很好，只需在鼻梁中央轻轻扫上高光即可增强立体感。' }, { title: '面部修容', content: '在颧骨下方、下颌线处使用修容粉，从外向内晕染。在苹果肌、额头中央、下巴和鼻梁使用高光提亮。' }, { title: '唇妆技巧', content: '您的唇形很好，直接使用唇膏或唇釉即可，可以在唇峰处轻点高光增加立体感。' }, { title: '底妆技巧', content: '选择与脖子肤色一致的粉底液，先用湿润的美妆蛋薄薄上一层，在需要遮盖的部位局部叠加。最后用散粉定妆。' }],

            [{ title: '眼妆重点', content: '单眼皮或内双建议用哑光眼影，避免珠光显肿。睫毛夹翘后刷睫毛膏，视觉上放大眼睛。' }, { title: '鼻部修容', content: '鼻梁低平的建议重点高光，从眉心到鼻尖连贯提亮。鼻翼宽的在鼻翼两侧打阴影。' }, { title: '面部修容', content: '根据脸型特点修容：圆脸纵向修，方脸柔和下颌，长脸横向修缩短脸型。' }, { title: '唇妆技巧', content: '嘴角下垂的用唇线笔上扬嘴角，唇色选择明亮色系提升气色。' }, { title: '底妆技巧', content: '油皮用控油妆前，干皮用保湿妆前。粉底液少量多次，避免厚重。瑕疵处用遮瑕膏点涂。' }]
        ];

        let selectedFile = null;

        function random(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        // 生成 6.5-9.5 之间更随机的总分（正态分布）
        function generateTotalScore() {
            const u1 = Math.random();
            const u2 = Math.random();
            let z = Math.sqrt(-2.0 * Math.log(u1)) * Math.cos(2.0 * Math.PI * u2);
            let score = 8.0 + z * 0.6;
            score = Math.max(6.5, Math.min(9.5, score));
            return score.toFixed(1);
        }

        function handleFile(input) {
            const file = input.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) { alert('请选择图片文件！'); input.value = ''; return; }
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('previewImage').src = e.target.result;
                document.getElementById('fileName').textContent = '已选择：' + file.name;
                document.getElementById('previewContainer').style.display = 'block';
                document.getElementById('uploadArea').style.display = 'none';
                document.getElementById('startBtn').disabled = false;
            };
            reader.readAsDataURL(file);
        }

        function startAnalyze() {
            if (!selectedFile) { alert('请先选择照片！'); return; }
            document.getElementById('uploadPage').style.display = 'none';
            document.getElementById('loadingPage').style.display = 'block';
            setTimeout(() => {
                generateResult();
                document.getElementById('loadingPage').style.display = 'none';
                document.getElementById('resultPage').style.display = 'block';
                document.getElementById('resultPage').classList.remove('result-section');
                setTimeout(() => {
                    const total = parseFloat(document.getElementById('totalScore').textContent);
                    document.getElementById('scoreBar').style.width = (total * 10) + '%';
                    document.querySelectorAll('.feature-fill').forEach(f => f.style.width = f.getAttribute('data-width'));
                }, 100);
            }, 2000);
        }

        function generateResult() {
            const type = random(beautyTypes);
            document.getElementById('typeName').textContent = type.name;
            document.getElementById('typeDesc').textContent = type.desc;
            document.getElementById('typeTags').innerHTML = type.tags.map(t => `<span class="type-tag">${t}</span>`).join('');

            // 生成总分 (6.5-9.5 之间随机分布)

            document.getElementById('totalScore').textContent = totalScore;

            const guxiangScores = [
                { name: '轮廓立体度', score: Math.max(6.5, Math.min(9.5, (baseScore + (Math.random() - 0.5) * 1.0))).toFixed(1), pros: '面部有一定立体感', cons: '面部可能较平，需要修容增加立体感' },

            // 皮相分析
            const pixiangScores = [
                { name: '皮肤质感', score: Math.max(6.5, Math.min(9.5, (baseScore + (Math.random() - 0.5) * 1.2))).toFixed(1), pros: '皮肤状态正常', cons: '可能有轻微毛孔或粗糙问题' },
                { name: '肤色均匀度', score: Math.max(6.5, Math.min(9.5, (baseScore + (Math.random() - 0.5) * 1.0))).toFixed(1), pros: '肤色较为均匀', cons: '可能有轻微色斑或暗沉' },

                { name: '光泽度', score: Math.max(6.5, Math.min(9.5, (baseScore + (Math.random() - 0.5) * 0.9))).toFixed(1), pros: '皮肤有自然光泽', cons: '可能有轻微暗沉' }
            ];

            // 详细分析
            const eyeDetail = random(detailData.eyes);

                <div class="detail-card"><div class="detail-title">👃 鼻部分析</div><div class="detail-content"><p>您的鼻子属于<strong>${noseDetail.type}</strong>，具有<strong>${noseDetail.feature}</strong>的特征。</p><ul class="detail-list">${noseDetail.items.map(i => `<li>${i}</li>`).join('')}</ul></div></div>
                <div class="detail-card"><div class="detail-title">👄 唇部分析</div><div class="detail-content"><p>您的嘴唇属于<strong>${lipDetail.type}</strong>，具有<strong>${lipDetail.feature}</strong>的特点。</p><ul class="detail-list">${lipDetail.items.map(i => `<li>${i}</li>`).join('')}</ul></div></div>

                <div class="detail-card"><div class="detail-title">🔬 骨骼结构</div><div class="detail-content"><p>您的面部骨骼结构优越，具有很好的抗衰老潜力。</p><ul class="detail-list"><li>面部立体度评分：${Math.max(6.5, Math.min(9.5, baseScore + Math.random() * 0.5)).toFixed(1)}/10</li><li>颧骨形态评分：${Math.max(6.5, Math.min(9.5, baseScore + Math.random() * 0.5)).toFixed(1)}/10</li><li>下颌线评分：${Math.max(6.5, Math.min(9.5, baseScore + Math.random() * 0.6)).toFixed(1)}/10</li></ul></div></div>
                <div class="detail-card"><div class="detail-title">✨ 皮肤质量</div><div class="detail-content"><p>您的皮肤类型为<strong>中性皮肤</strong>，具有<strong>毛孔细腻</strong>的特点。</p><ul class="detail-list"><li>皮肤质感评分：${Math.max(6.5, Math.min(9.5, baseScore + Math.random() * 0.4)).toFixed(1)}/10</li><li>肤色均匀度评分：${Math.max(6.5, Math.min(9.5, baseScore + Math.random() * 0.5)).toFixed(1)}/10</li><li>皮肤光泽度评分：${Math.max(6.5, Math.min(9.5, baseScore + Math.random() * 0.6)).toFixed(1)}/10</li></ul></div></div>
            `;

            // 化妆建议
            const makeup = random(makeupData);
            document.getElementById('makeupList').innerHTML = makeup.map(m => `<li><strong>${m.title}</strong>${m.content}</li>`).join('');
        }

        function renderFeatures(containerId, data) {
            document.getElementById(containerId).innerHTML = data.map(item => `
                <div class="feature-item">
                    <div class="feature-header"><span class="feature-name">${item.name}</span><span class="feature-score">${item.score}</span></div>
                    <div class="feature-bar"><div class="feature-fill" data-width="${item.score * 10}%"></div></div>
                    <div class="feature-pros">优点：${item.pros}</div>
                    <div class="feature-cons">可优化：${item.cons}</div>
                </div>
            `).join('');
        }

        function reset() {
            document.getElementById('resultPage').style.display = 'none';
            document.getElementById('resultPage').classList.add('result-section');
            document.getElementById('uploadPage').style.display = 'block';
            document.getElementById('previewContainer').style.display = 'none';
            document.getElementById('uploadArea').style.display = 'block';
            document.getElementById('fileInput').value = '';
            document.getElementById('startBtn').disabled = true;
            selectedFile = null;
        }

        function share() { alert('分享功能开发中...'); }
    </script>
